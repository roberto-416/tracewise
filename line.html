<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracewise — Line</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="assets/data.js"></script>
  <script src="assets/ui.js"></script>
</head>
<body>
  <div class="tw-grid">
    <aside class="tw-sidebar" aria-label="Lines">
      <input type="search" class="tw-search" id="tw-search" placeholder="Search lines or operators…" autocomplete="off">
      <div id="tw-line-list">
        <div class="tw-skeleton" aria-hidden="true">
          <div class="tw-skel-bar"></div><div class="tw-skel-bar" style="width:80%"></div>
          <div class="tw-skel-bar" style="width:60%"></div><div class="tw-skel-bar" style="width:70%"></div>
        </div>
      </div>
    </aside>
    <main class="tw-main" id="tw-main">
      <div class="tw-loading">Loading…</div>
    </main>
  </div>

  <script>
  (async function () {
    'use strict';
    TW.renderHeader('index');

    const lineId = TW.qs('id');
    if (!lineId) { TW.notFound('line'); return; }

    try {
      await Tracewise.load(TW.qs('city') || undefined);
    } catch (e) {
      document.getElementById('tw-main').innerHTML = '<div class="tw-empty-section">Could not load data.</div>';
      return;
    }

    const ix = Tracewise.indexes;
    const line = ix.linesById.get(lineId);
    if (!line) { TW.notFound('line'); return; }

    const op = ix.operatorsById.get(line.primary_operator_id);
    const tracks = ix.tracksByLine.get(line.id) || [];
    const services = ix.servicesByLine.get(line.id) || [];

    const stopList = []; // ordered: tracksByLine × stopsByTrack
    for (const t of tracks) {
      for (const stop of (ix.stopsByTrack.get(t.id) || [])) {
        stopList.push({ stop, track: t });
      }
    }
    const stationCount = new Set(stopList.map(s => s.stop.station_node_id)).size;

    const renderSidebar = TW.renderLineSidebar('tw-line-list', { activeId: line.id });
    TW.wireSearch('tw-search', renderSidebar);

    const main = document.getElementById('tw-main');
    main.innerHTML = `
      <div class="tw-page-title" style="color:${line.colour}">${TW.escapeHtml(line.display_name_en)}</div>
      <div class="tw-page-subtitle">${TW.escapeHtml(line.display_name_ja || '')}</div>
      <div class="tw-meta">
        ${TW.opPill(op)}
        <span class="tw-counts">${tracks.length} track${tracks.length===1?'':'s'} · ${services.length} service${services.length===1?'':'s'} · ${stationCount} station${stationCount===1?'':'s'}</span>
      </div>
      <div class="tw-map" id="tw-map" role="application" aria-label="Map of ${TW.escapeHtml(line.display_name_en)} tracks"></div>
      <h2 class="tw-section-h">Stopping pattern</h2>
      <div id="tw-matrix-wrap"></div>
      <h2 class="tw-section-h">Frequency (trains per hour)</h2>
      <div id="tw-freq-wrap"></div>
    `;

    // ----- map -----
    const styleUrl = await TW.mapStyle();
    const map = new maplibregl.Map({
      container: 'tw-map',
      style: styleUrl,
      center: (Tracewise.data.config && Tracewise.data.config.default_centre) || [135.5, 34.7],
      zoom: 11,
      attributionControl: { compact: true }
    });
    map.addControl(new maplibregl.NavigationControl({ visualizePitch: false }), 'top-right');

    const lineTrackIds = tracks.map(t => t.id);
    const allTrackIds = (Tracewise.data.tracks || []).map(t => t.id);
    const lineFC = TW.trackFC(lineTrackIds);
    for (const f of lineFC.features) f.properties.colour = line.colour;
    const otherFC = TW.trackFC(allTrackIds.filter(tid => !lineTrackIds.includes(tid)));

    const clusterIds = new Set();
    for (const tid of lineTrackIds) {
      for (const stop of (ix.stopsByTrack.get(tid) || [])) {
        const cid = ix.clusterByNode.get(stop.station_node_id);
        if (cid) clusterIds.add(cid);
      }
    }
    const clusterFC = TW.clusterFC(Array.from(clusterIds));

    map.on('load', () => {
      map.addSource('tw-tracks-other', { type: 'geojson', data: otherFC });
      map.addLayer({
        id: 'tw-tracks-other-line', type: 'line', source: 'tw-tracks-other',
        paint: { 'line-color': ['get', 'colour'], 'line-width': 1, 'line-opacity': 0.3 }
      });
      map.addSource('tw-tracks', { type: 'geojson', data: lineFC });
      map.addSource('tw-clusters', { type: 'geojson', data: clusterFC });
      TW.addCommonLayers(map, { labelMinZoom: 11, lineWidth: 4, casingWidth: 6 });

      map.on('click', 'tw-cluster-dots', e => {
        const f = e.features[0]; if (!f) return;
        location.href = `station.html?id=${encodeURIComponent(f.properties.cluster_id)}`;
      });

      TW.fitBoundsToFC(map, lineFC, 60);
    });

    // ----- matrix -----
    const matrixWrap = document.getElementById('tw-matrix-wrap');
    if (services.length === 0 || stopList.length === 0) {
      matrixWrap.innerHTML = '<div class="tw-empty-section">No services on this line yet.</div>';
    } else {
      const cols = stopList;
      let stripHtml = '<tr class="tw-track-strip"><td class="tw-svc-label" style="height:4px"></td>';
      for (const c of cols) {
        stripHtml += `<th class="tw-track-strip-cell" style="background:${c.track.colour}"></th>`;
      }
      stripHtml += '</tr>';

      let headHtml = '<tr class="tw-headers"><th class="tw-svc-label">Service</th>';
      for (const c of cols) {
        const node = ix.nodesById.get(c.stop.station_node_id);
        const en = node ? node.name_en : '?';
        const ja = node ? node.name_ja : '';
        headHtml += `<th class="tw-stn-h" title="${TW.escapeHtml(en)}">
          <span class="tw-stn-h-rot">${TW.escapeHtml(en)}<span class="tw-stn-h-ja">${TW.escapeHtml(ja)}</span></span>
        </th>`;
      }
      headHtml += '</tr>';

      let bodyHtml = '';
      for (const svc of services) {
        const inPattern = new Set(svc.stop_pattern || []);
        const hasOverrides = svc.stop_pattern_overrides && Object.keys(svc.stop_pattern_overrides).length > 0;
        const labelExtras = `${TW.suppPill(svc.supplement)}${hasOverrides ? '<span class="tw-pill" title="Pattern varies by time band">varies</span>' : ''}`;
        bodyHtml += `<tr><td class="tw-svc-label" title="${TW.escapeHtml(svc.display_name_en)}">
          <a href="service.html?id=${encodeURIComponent(svc.id)}" style="color:inherit">${TW.escapeHtml(svc.display_name_en)}</a> ${labelExtras}
        </td>`;
        for (const c of cols) {
          if (inPattern.has(c.stop.id)) {
            bodyHtml += `<td class="tw-cell"><span class="tw-stop-dot" style="background:${op ? op.colour : '#888'}"></span></td>`;
          } else {
            bodyHtml += `<td class="tw-cell"><span class="tw-skip-dot"></span></td>`;
          }
        }
        bodyHtml += '</tr>';
      }

      matrixWrap.innerHTML = `<div class="tw-matrix-wrap"><table class="tw-matrix" role="grid">
        <thead>${stripHtml}${headHtml}</thead>
        <tbody>${bodyHtml}</tbody>
      </table></div>`;
    }

    // ----- frequency heatmap -----
    const freqWrap = document.getElementById('tw-freq-wrap');
    if (stopList.length === 0) {
      freqWrap.innerHTML = '<div class="tw-empty-section">No frequency data.</div>';
    } else {
      const bands = ['peak_am', 'midday', 'peak_pm', 'evening', 'weekend'];
      const bandLabels = { peak_am: 'AM peak', midday: 'Midday', peak_pm: 'PM peak', evening: 'Evening', weekend: 'Weekend' };
      let head = '<tr><th class="tw-band-label">Band</th>';
      for (const c of stopList) {
        const node = ix.nodesById.get(c.stop.station_node_id);
        head += `<th class="tw-stn-h" title="${TW.escapeHtml(node ? node.name_en : '')}">
          <span class="tw-stn-h-rot">${TW.escapeHtml(node ? node.name_en : '?')}</span>
        </th>`;
      }
      head += '</tr>';
      let body = '';
      for (const band of bands) {
        body += `<tr><td class="tw-band-label">${bandLabels[band]}</td>`;
        for (const c of stopList) {
          const f = ix.frequencyByStop.get(c.stop.id);
          const tph = f ? f[band] : 0;
          body += TW.freqCell(tph);
        }
        body += '</tr>';
      }
      freqWrap.innerHTML = `<div class="tw-matrix-wrap"><table class="tw-freq-table" role="grid">
        <thead>${head}</thead><tbody>${body}</tbody>
      </table></div>`;
    }

    Tracewise.geometryReady.then(() => {
      const src = map.getSource && map.getSource('tw-tracks');
      if (!src) return;
      const fc = TW.trackFC(lineTrackIds);
      for (const f of fc.features) f.properties.colour = line.colour;
      src.setData(fc);
      const otherSrc = map.getSource('tw-tracks-other');
      if (otherSrc) otherSrc.setData(TW.trackFC(allTrackIds.filter(tid => !lineTrackIds.includes(tid))));
    });
  })();
  </script>
</body>
</html>
