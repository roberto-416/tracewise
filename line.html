<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tracewise — Line</title>
  <link rel="stylesheet" href="css/app.css?v=11" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Lines</h2>
      <input id="search" type="search" placeholder="Filter lines…"
        style="width:100%;padding:5px 8px;margin-bottom:8px;background:var(--panel-2);border:1px solid var(--rule);border-radius:4px;color:var(--ink);font-size:13px;" />
      <ul id="line-list"></ul>
    </aside>
    <main class="content" id="content">
      <div id="header"></div>
      <h2>Route map</h2>
      <div id="line-map"></div>
      <h2>Stopping pattern matrix</h2>
      <div class="legend">
        <span class="item"><span class="dot f5"></span> ≥12/hr</span>
        <span class="item"><span class="dot f4"></span> 8–11</span>
        <span class="item"><span class="dot f3"></span> 4–7</span>
        <span class="item"><span class="dot f2"></span> 2–3</span>
        <span class="item"><span class="dot f1"></span> &lt;2</span>
        <span class="item"><span class="dot f0"></span> does not stop</span>
      </div>
      <div class="matrix-wrap"><table class="matrix" id="matrix"></table></div>
    </main>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="js/data.js?v=11"></script>
  <script src="js/line.js?v=11"></script>
</body>
</html>
